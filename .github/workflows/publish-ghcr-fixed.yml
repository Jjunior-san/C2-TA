name: Publish images to GHCR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare lowercase owner
        id: prep
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.owner_lc }}/c2-ta-web:latest

      - name: Build and push proxy image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/nginx
          push: true
          tags: ghcr.io/${{ steps.prep.outputs.owner_lc }}/c2-ta-proxy:latest
