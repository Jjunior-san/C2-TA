services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-c2_ta}
      POSTGRES_USER: ${POSTGRES_USER:-c2ta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-c2ta_dev_change}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - c2ta_postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      C2TA_ENVIRONMENT: ${C2TA_ENVIRONMENT:-portainer}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-troque-esta-chave}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,ta.c2sistemas.online}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000,https://ta.c2sistemas.online}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-0}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-0}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-0}
      DJANGO_SESSION_COOKIE_SAMESITE: ${DJANGO_SESSION_COOKIE_SAMESITE:-Lax}
      DJANGO_CSRF_COOKIE_SAMESITE: ${DJANGO_CSRF_COOKIE_SAMESITE:-Lax}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-c2ta}:${POSTGRES_PASSWORD:-c2ta_dev_change}@db:5432/${POSTGRES_DB:-c2_ta}
      DATABASE_SSL_REQUIRED: ${DATABASE_SSL_REQUIRED:-0}
      C2TA_PUBLIC_BASE_URL: ${C2TA_PUBLIC_BASE_URL:-https://ta.c2sistemas.online}
      C2TA_BOOTSTRAP_CREATE_ADMIN: ${C2TA_BOOTSTRAP_CREATE_ADMIN:-1}
      C2TA_ADMIN_USERNAME: ${C2TA_ADMIN_USERNAME:-admin}
      C2TA_ADMIN_EMAIL: ${C2TA_ADMIN_EMAIL:-admin@c2ta.local}
      C2TA_ADMIN_PASSWORD: ${C2TA_ADMIN_PASSWORD:-admin}
      C2TA_ADMIN_FULL_NAME: ${C2TA_ADMIN_FULL_NAME:-Administrador C2-TA}
      C2TA_ERP_BASE_URL: ${C2TA_ERP_BASE_URL:-https://gestao.c2sistemas.online}
      C2TA_ERP_API_TOKEN: ${C2TA_ERP_API_TOKEN:-}
      C2TA_ERP_VERIFY_SSL: ${C2TA_ERP_VERIFY_SSL:-1}
      C2TA_ERP_TIMEOUT_SECONDS: ${C2TA_ERP_TIMEOUT_SECONDS:-20}
      C2TA_WEBHOOK_SECRET: ${C2TA_WEBHOOK_SECRET:-troque-por-um-segredo-forte}
      C2TA_WEBHOOK_TOLERANCE_SECONDS: ${C2TA_WEBHOOK_TOLERANCE_SECONDS:-300}
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - c2ta_static_volume:/app/staticfiles

  proxy:
    build:
      context: ./infra/nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${C2TA_PORT:-8010}:80"
    volumes:
      - c2ta_static_volume:/var/www/static:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  c2ta_postgres_data:
  c2ta_static_volume:
